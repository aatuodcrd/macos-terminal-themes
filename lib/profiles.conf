# term-tint theme pools for random + appearance-aware switching.
# Names must match the Terminal.app profile names exactly (the installed ones).
#
# 10 dark + 10 light, built to be CLEARLY distinct at a glance (every pair
# differs a lot in color/brightness) so you can tell windows apart. All low eye
# strain: no green and no red backgrounds. Named after their tone.
#
# Edit freely: remove any you dislike, reorder, or add your own installed
# profiles by name. Changes take effect on the next new window (no reload needed).

DARK_THEMES=(
  "Ink Black"
  "Steel Gray"
  "Deep Blue"
  "Slate Blue"
  "Indigo"
  "Violet"
  "Magenta"
  "Plum"
  "Amber"
  "Bronze"
)

